<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f5f0ea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<title>Mi Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0ea;--surface:#fff;--surface2:#ede8e1;--surface3:#e5dfd7;
  --border:#ddd6cc;--border-light:#ccc5ba;
  --text:#1a1410;--text-dim:#6b5e52;--text-muted:#a89a8c;
  --accent:#f05a28;--accent-soft:#f05a2815;--accent-light:#ff7a4d;
  --dark:#1a1410;
  --danger:#e53935;--success:#2e7d32;--warning:#f9a825;
  --radius:16px;--radius-sm:12px;
}
html{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body{min-height:100dvh}
::-webkit-scrollbar{width:0}

/* ── Layout ── */
.app{max-width:480px;margin:0 auto;padding:0 20px 160px;position:relative}

/* ── Header ── */
.header{padding:16px 0 12px;display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo svg{width:38px;height:38px}
.header-logo h1{font-size:1.5rem;font-weight:800;letter-spacing:-.03em}
.header-logo h1 span{color:var(--accent)}
.header-add{width:46px;height:46px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:grid;place-items:center;box-shadow:0 4px 14px #f05a2840;transition:all .2s;flex-shrink:0}
.header-add:hover{transform:scale(1.08)}
.header-add:active{transform:scale(.94)}
.header-add svg{width:22px;height:22px}

.divider{height:1px;background:var(--border);margin-bottom:14px}

/* ── Month Nav ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px}
.month-nav h2{font-size:1.35rem;font-weight:800;letter-spacing:-.02em;text-align:center;flex:1}
.month-nav h2 .year{display:block;font-size:.8rem;font-weight:500;color:var(--text-muted);letter-spacing:.02em;margin-top:1px}
.nav-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;display:grid;place-items:center;transition:all .2s;flex-shrink:0}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn:active{transform:scale(.92)}
.nav-btn svg{width:18px;height:18px}

/* ── Calendar Grid ── */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-header span{text-align:center;font-size:.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;padding:6px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;transition:all .15s;position:relative;font-size:.92rem;font-weight:500;gap:2px}
.cal-day:active{transform:scale(.9)}
.cal-day.other{color:var(--text-muted);opacity:.4}
.cal-day.today{background:var(--accent);color:#fff;font-weight:700;box-shadow:0 2px 10px #f05a2835}
.cal-day.today .day-dots span{background:#fff}
.cal-day.selected:not(.today){background:var(--surface2);font-weight:700}
.cal-day.has-events .day-dots span{background:var(--accent)}
.cal-day.selected:not(.today) .day-dots span{background:var(--accent)}
.day-dots{display:flex;gap:2px;height:4px;position:absolute;bottom:4px}
.day-dots span{width:4px;height:4px;border-radius:50%}

/* ── Day Detail ── */
.day-detail{margin-top:20px;animation:slideDown .3s ease}
.day-detail-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.day-detail-header h3{font-size:1rem;font-weight:700}
.day-detail-header h3 span{color:var(--text-dim);font-weight:400;font-size:.85rem;margin-left:4px}
.add-btn{height:30px;padding:0 14px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s;font-family:inherit}
.add-btn:hover{filter:brightness(1.1);transform:scale(1.03)}
.add-btn svg{width:14px;height:14px}

/* ── Event Cards ── */
.events-list{display:flex;flex-direction:column;gap:8px}
.event-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;display:flex;gap:12px;transition:all .2s;animation:slideDown .3s ease;box-shadow:0 1px 4px #1a141008}
.event-card:active{transform:scale(.98)}
.event-time{display:flex;flex-direction:column;align-items:center;min-width:44px;padding-top:2px}
.event-time .hour{font-size:.85rem;font-weight:700;color:var(--accent)}
.event-bar{width:3px;border-radius:3px;align-self:stretch;flex-shrink:0}
.event-info{flex:1;min-width:0}
.event-info h4{font-size:.88rem;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-info p{font-size:.73rem;color:var(--text-dim);line-height:1.3}
.event-actions{display:flex;flex-direction:column;gap:4px}
.event-actions button{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:grid;place-items:center;transition:all .15s}
.event-actions button:active{background:var(--surface2)}
.event-actions button.del:active{color:var(--danger)}
.event-actions button svg{width:14px;height:14px}
.empty-day{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:.85rem}
.empty-day svg{width:36px;height:36px;margin-bottom:10px;opacity:.25}

/* ── Notif banner ── */
.notif-banner{background:var(--surface);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .3s;animation:slideDown .4s ease;box-shadow:0 1px 4px #1a141008}
.notif-banner.subscribed{background:linear-gradient(135deg,#2e7d3208,#2e7d3204)}
.notif-banner .dot{width:7px;height:7px;border-radius:50%;background:var(--warning);flex-shrink:0;animation:pulse 2s infinite}
.notif-banner.subscribed .dot{background:var(--success);animation:none}
.notif-banner p{font-size:.78rem;color:var(--text-dim);line-height:1.4}
.notif-banner p strong{color:var(--text);font-weight:600}

/* ── Tab Bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:center;z-index:60}
.tab-bar-inner{display:flex;max-width:480px;width:100%;justify-content:space-around;padding:10px 0 calc(10px + env(safe-area-inset-bottom))}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 12px;font-family:inherit;transition:color .2s;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--accent)}
.tab svg{width:22px;height:22px}
.tab span{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}

/* ── FAB Micrófono ── */
.fab-mic{position:fixed;bottom:100px;right:20px;width:56px;height:56px;border-radius:50%;border:none;background:var(--dark);color:#fff;cursor:pointer;display:grid;place-items:center;z-index:55;box-shadow:0 4px 20px #1a141040;transition:all .2s}
.fab-mic:hover{transform:scale(1.06)}
.fab-mic:active{transform:scale(.94)}
.fab-mic svg{width:24px;height:24px;z-index:2}
.fab-mic.recording{background:var(--danger);box-shadow:0 4px 20px #e5393540}
.fab-pulse{position:absolute;inset:0;border-radius:50%;background:var(--danger);opacity:0;z-index:1;pointer-events:none}
.fab-mic.recording .fab-pulse{animation:fab-ring 1.5s ease-out infinite}
.fab-transcript{position:fixed;bottom:168px;left:50%;transform:translateX(-50%);background:var(--surface);border-radius:var(--radius);padding:12px 20px;font-size:.88rem;font-weight:500;color:var(--text);z-index:55;box-shadow:0 4px 24px #1a141018;max-width:calc(100vw - 40px);text-align:center;display:none;animation:slideDown .2s ease}
.fab-transcript.visible{display:block}

/* ── Search overlay ── */
.search-overlay{position:fixed;inset:0;background:var(--bg);z-index:90;display:none;flex-direction:column;padding:16px 20px env(safe-area-inset-bottom)}
.search-overlay.open{display:flex}
.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.search-bar input{flex:1;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-size:.9rem;font-family:inherit;color:var(--text);outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:600;padding:8px}
.search-results{flex:1;overflow-y:auto}
.search-result{padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.search-result h4{font-size:.88rem;font-weight:600;margin-bottom:2px}
.search-result p{font-size:.75rem;color:var(--text-dim)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:#1a141040;backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px calc(28px + env(safe-area-inset-bottom));animation:slideUp .3s ease;box-shadow:0 -4px 30px #1a141015}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 18px}
.modal h2{font-size:1.15rem;font-weight:800;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.7rem;font-weight:700;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.88rem;font-family:inherit;transition:border-color .2s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:56px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.reminder-toggles{display:flex;flex-wrap:wrap;gap:6px}
.rem-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text-dim);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.rem-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.modal-actions .primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-actions .primary:active{filter:brightness(.9)}

/* ── Colors ── */
.c-orange{background:#f05a28}.c-rose{background:#e91e63}.c-amber{background:#ff9800}
.c-emerald{background:#4caf50}.c-cyan{background:#00bcd4}.c-purple{background:#9c27b0}
.c-colors{display:flex;gap:8px}
.c-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;opacity:.65}
.c-dot:active{transform:scale(1.15)}
.c-dot.active{border-color:var(--text);opacity:1;transform:scale(1.1)}

/* ── Mic in modal ── */
.input-mic{position:relative;display:flex;align-items:stretch}
.input-mic input,.input-mic textarea{flex:1;padding-right:44px}
.mic-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:grid;place-items:center;transition:all .2s}
.mic-btn.recording{color:var(--danger);animation:pulse-rec 1s infinite}
.mic-btn svg{width:16px;height:16px}
.input-mic textarea ~ .mic-btn{top:14px;transform:none}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;background:var(--dark);color:#fff;font-size:.8rem;font-weight:500;z-index:200;animation:toastIn .3s ease;white-space:nowrap;box-shadow:0 4px 20px #1a141030}
.toast.error{background:#c62828}
.toast.success{background:#2e7d32}

/* ── Alarm overlay ── */
.alarm-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1a1410 0%,#2d1f15 100%);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
.alarm-overlay.active{display:flex}
.alarm-icon{width:100px;height:100px;border-radius:50%;background:var(--accent);display:grid;place-items:center;animation:alarm-pulse 1s ease-in-out infinite;box-shadow:0 0 40px #f05a2860}
.alarm-icon svg{width:48px;height:48px;color:#fff}
@keyframes alarm-pulse{0%,100%{transform:scale(1);box-shadow:0 0 40px #f05a2860}50%{transform:scale(1.12);box-shadow:0 0 80px #f05a2880}}
.alarm-title{color:#fff;font-size:1.5rem;font-weight:800;text-align:center}
.alarm-body{color:#ffffff90;font-size:1rem;text-align:center}
.alarm-stop{margin-top:20px;padding:16px 60px;border-radius:50px;border:none;background:#fff;color:var(--dark);font-size:1.1rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px #ffffff30;transition:transform .2s}
.alarm-stop:active{transform:scale(.95)}

/* ── Animations ── */
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 #e5393540}50%{box-shadow:0 0 0 8px #e5393500}}
@keyframes fab-ring{0%{transform:scale(1);opacity:.35}100%{transform:scale(1.8);opacity:0}}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 40 40" fill="none">
        <rect x="2" y="6" width="36" height="32" rx="8" fill="#f05a28"/>
        <rect x="6" y="14" width="28" height="20" rx="4" fill="#fff"/>
        <rect x="10" y="2" width="4" height="8" rx="2" fill="#f05a28"/>
        <rect x="26" y="2" width="4" height="8" rx="2" fill="#f05a28"/>
        <rect x="11" y="19" width="5" height="5" rx="1.5" fill="#f05a2830"/>
        <rect x="17.5" y="19" width="5" height="5" rx="1.5" fill="#f05a2830"/>
        <rect x="24" y="19" width="5" height="5" rx="1.5" fill="#f05a2830"/>
        <rect x="11" y="26" width="5" height="5" rx="1.5" fill="#f05a2830"/>
        <rect x="17.5" y="26" width="5" height="5" rx="1.5" fill="#f05a28" opacity=".8"/>
      </svg>
      <h1>Mi <span>Agenda</span></h1>
    </div>
    <button class="header-add" onclick="openModal()" title="Nuevo evento">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <div class="divider"></div>

  <!-- Notification Banner -->
  <div class="notif-banner" id="notifBanner" onclick="toggleNotifications()">
    <div class="dot"></div>
    <p><strong>Notificaciones desactivadas</strong><br>Toca para activar recordatorios</p>
  </div>

  <!-- Month Navigation -->
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h2 id="monthTitle"></h2>
    <button class="nav-btn" onclick="changeMonth(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>

  <!-- Calendar -->
  <div class="cal-header" id="calHeader"></div>
  <div class="cal-grid" id="calGrid"></div>

  <!-- Day Detail -->
  <div class="day-detail" id="dayDetail"></div>
</div>

<!-- FAB Micrófono -->
<button class="fab-mic" id="fabMic" onclick="startQuickVoice()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
  <div class="fab-pulse" id="fabPulse"></div>
</button>
<div class="fab-transcript" id="fabTranscript"></div>

<!-- Tab Bar -->
<nav class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab" onclick="showAgenda()" id="tabAgenda">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
      <span>Agenda</span>
    </button>
    <button class="tab active" onclick="showMonth()" id="tabMonth">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><rect x="7" y="13" width="4" height="4" rx="1"/><rect x="13" y="13" width="4" height="4" rx="1"/></svg>
      <span>Mes</span>
    </button>
    <button class="tab" onclick="showYear()" id="tabYear">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Año</span>
    </button>
    <button class="tab" onclick="goToday()" id="tabToday">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span>Hoy</span>
    </button>
    <button class="tab" onclick="openSearch()" id="tabSearch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span>Buscar</span>
    </button>
  </div>
</nav>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar eventos..." oninput="doSearch(this.value)" autocomplete="off">
    <button onclick="closeSearch()">Cerrar</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Alarm Overlay -->
<div class="alarm-overlay" id="alarmOverlay">
  <div class="alarm-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/><path d="M2 2l2.5 2.5M22 2l-2.5 2.5"/></svg>
  </div>
  <div class="alarm-title" id="alarmTitle">Recordatorio</div>
  <div class="alarm-body" id="alarmBody"></div>
  <button class="alarm-stop" onclick="stopAlarm()">Parar</button>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nuevo evento</h2>
    <form id="eventForm" onsubmit="saveEvent(event)">
      <input type="hidden" id="editId">
      <div class="field">
        <label>Titulo</label>
        <div class="input-mic">
          <input type="text" id="evTitle" required placeholder="Reunión, cita, tarea..." autocomplete="off">
          <button type="button" class="mic-btn" onclick="startVoice('evTitle')" title="Dictar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Hora inicio</label><input type="time" id="evStart" value="09:00" required></div>
        <div class="field"><label>Hora fin</label><input type="time" id="evEnd" value="10:00"></div>
      </div>
      <div class="field">
        <label>Notas</label>
        <div class="input-mic">
          <textarea id="evNotes" placeholder="Opcional..."></textarea>

<script>
const API = '';
const API_KEY = 'miagenda-notif-sk-ad6eec2c9dcdcd64c58b7c5bda05d431';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS = ['L','M','X','J','V','S','D'];
const COLORS = {orange:'#f05a28',rose:'#e91e63',amber:'#ff9800',emerald:'#4caf50',cyan:'#00bcd4',purple:'#9c27b0',indigo:'#f05a28'};

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let selectedDate = new Date();
let events = JSON.parse(localStorage.getItem('agenda_events') || '[]');
let playerId = localStorage.getItem('agenda_player_id');
let isSubscribed = false;
let selectedColor = 'orange';
let currentView = 'month';

if (!playerId) { playerId = crypto.randomUUID(); localStorage.setItem('agenda_player_id', playerId); }

function apiFetch(path, opts = {}) {
  opts.headers = { ...opts.headers, 'Content-Type': 'application/json', 'x-api-key': API_KEY };
  return fetch(API + path, opts);
}

// ── Push Notifications ──────────────────────────────────────────────────
async function initNotifications() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    const sub = await reg.pushManager.getSubscription();
    if (sub) { isSubscribed = true; await registerSubscription(sub); updateNotifUI(); }
  } catch (e) { console.error('SW init error:', e); }
}

async function toggleNotifications() {
  if (!('PushManager' in window)) return toast('Tu navegador no soporta notificaciones push', 'error');
  if (isSubscribed) return toast('Notificaciones ya activadas', 'success');
  try {
    const reg = await navigator.serviceWorker.ready;
    const res = await apiFetch('/api/vapid-public');
    const { publicKey } = await res.json();
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(publicKey) });
    await registerSubscription(sub);
    isSubscribed = true; updateNotifUI();
    toast('Notificaciones activadas', 'success');
    events.forEach(ev => scheduleReminders(ev));
  } catch (e) { console.error('Subscribe error:', e); toast('Error al activar notificaciones', 'error'); }
}

async function registerSubscription(sub) {
  try { await apiFetch('/api/subscribe', { method: 'POST', body: JSON.stringify({ playerId, subscription: sub }) }); } catch (e) {}
}

function updateNotifUI() {
  const banner = document.getElementById('notifBanner');
  if (isSubscribed) { banner.classList.add('subscribed'); banner.querySelector('p').innerHTML = '<strong>Notificaciones activadas</strong><br>Recibirás recordatorios push'; }
}

async function scheduleReminders(ev) {
  if (!isSubscribed) return;
  const evDate = new Date(ev.date + 'T' + ev.start);
  const reminders = ev.reminders || [60, '9am', 1440];
  for (let i = 0; i < reminders.length; i++) {
    const rem = reminders[i];
    let fireAt, label;
    if (rem === '9am') { fireAt = new Date(ev.date + 'T09:00:00'); label = `Hoy a las 9:00 — evento a las ${ev.start}`; }
    else { const min = parseInt(rem); fireAt = new Date(evDate.getTime() - min * 60000); label = min === 0 ? 'Ahora' : min < 60 ? `En ${min} min` : min === 60 ? 'En 1 hora' : 'Mañana'; }
    if (fireAt <= new Date()) continue;
    try { await apiFetch('/api/schedule', { method: 'POST', body: JSON.stringify({ playerId, eventId: ev.id, remIndex: i, title: ev.title, body: label, fireAt: fireAt.toISOString() }) }); } catch (e) {}
  }
}

async function cancelReminders(eventId) { try { await apiFetch('/api/cancel/' + eventId, { method: 'DELETE' }); } catch (e) {} }

// ── Calendar Rendering ──────────────────────────────────────────────────
function renderCalHeader() { document.getElementById('calHeader').innerHTML = DAYS.map(d => `<span>${d}</span>`).join(''); }

function renderCalendar() {
  document.getElementById('monthTitle').innerHTML = `${MONTHS[currentMonth]}<span class="year">${currentYear}</span>`;
  const first = new Date(currentYear, currentMonth, 1);
  const last = new Date(currentYear, currentMonth + 1, 0);
  let startDay = first.getDay() - 1; if (startDay < 0) startDay = 6;
  const today = new Date(); const todayStr = fmtDate(today); const selStr = fmtDate(selectedDate);
  let html = '';
  const prevLast = new Date(currentYear, currentMonth, 0);
  for (let i = startDay - 1; i >= 0; i--) html += `<div class="cal-day other">${prevLast.getDate() - i}</div>`;
  for (let d = 1; d <= last.getDate(); d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr; const isSel = dateStr === selStr;
    const dayEvents = events.filter(e => e.date === dateStr);
    const dots = dayEvents.length > 0 ? `<div class="day-dots">${dayEvents.slice(0,3).map(e=>`<span style="background:${COLORS[e.color]||COLORS.orange}"></span>`).join('')}</div>` : '';
    html += `<div class="cal-day${isToday?' today':''}${isSel&&!isToday?' selected':''}${dayEvents.length?' has-events':''}" onclick="selectDate('${dateStr}')">${d}${dots}</div>`;
  }
  const totalCells = startDay + last.getDate();
  for (let d = 1; d <= (7 - totalCells % 7) % 7; d++) html += `<div class="cal-day other">${d}</div>`;
  document.getElementById('calGrid').innerHTML = html;
  renderDayDetail();
}

function renderDayDetail() {
  const selStr = fmtDate(selectedDate);
  const dayEvents = events.filter(e => e.date === selStr).sort((a,b) => a.start.localeCompare(b.start));
  const dayName = selectedDate.toLocaleDateString('es-ES', { weekday: 'long' });
  const dayNum = selectedDate.getDate();
  let html = `<div class="day-detail-header"><h3>${capitalize(dayName)} ${dayNum} <span>${MONTHS[selectedDate.getMonth()]}</span></h3><button class="add-btn" onclick="openModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Nuevo</button></div>`;
  if (dayEvents.length === 0) {
    html += `<div class="empty-day"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><p>Sin eventos</p></div>`;
  } else {
    html += '<div class="events-list">';
    dayEvents.forEach(ev => {
      const color = COLORS[ev.color] || COLORS.orange;
      html += `<div class="event-card"><div class="event-time"><span class="hour">${ev.start}</span></div><div class="event-bar" style="background:${color}"></div><div class="event-info"><h4>${esc(ev.title)}</h4><p>${ev.start}${ev.end?' — '+ev.end:''}${ev.notes?' · '+esc(ev.notes):''}</p></div><div class="event-actions"><button onclick="editEvent('${ev.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5z"/></svg></button><button class="del" onclick="deleteEvent('${ev.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div>`;
    });
    html += '</div>';
  }
  document.getElementById('dayDetail').innerHTML = html;
}

// ── Tab Bar Views ───────────────────────────────────────────────────────
function setActiveTab(id) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id)?.classList.add('active'); }

function showMonth() { currentView = 'month'; setActiveTab('tabMonth'); renderCalendar(); }

function showAgenda() {
  currentView = 'agenda'; setActiveTab('tabAgenda');
  const upcoming = events.filter(e => e.date >= fmtDate(new Date())).sort((a,b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
  let html = '<div class="day-detail-header"><h3>Próximos eventos</h3></div>';
  if (upcoming.length === 0) { html += '<div class="empty-day"><p>No hay eventos próximos</p></div>'; }
  else {
    html += '<div class="events-list">';
    let lastDate = '';
    upcoming.forEach(ev => {
      if (ev.date !== lastDate) {
        lastDate = ev.date;
        const d = new Date(ev.date + 'T12:00:00');
        html += `<div style="padding:8px 0 4px;font-size:.75rem;font-weight:700;color:var(--text-dim)">${d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>`;
      }
      const color = COLORS[ev.color] || COLORS.orange;
      html += `<div class="event-card" onclick="selectDate('${ev.date}');showMonth()"><div class="event-time"><span class="hour">${ev.start}</span></div><div class="event-bar" style="background:${color}"></div><div class="event-info"><h4>${esc(ev.title)}</h4><p>${ev.start}${ev.notes?' · '+esc(ev.notes):''}</p></div></div>`;
    });
    html += '</div>';
  }
  document.getElementById('dayDetail').innerHTML = html;
  document.getElementById('calGrid').innerHTML = '';
  document.getElementById('calHeader').innerHTML = '';
  document.getElementById('monthTitle').innerHTML = `Agenda<span class="year">${currentYear}</span>`;
}

function showYear() {
  currentView = 'year'; setActiveTab('tabYear');
  document.getElementById('calHeader').innerHTML = '';
  document.getElementById('dayDetail').innerHTML = '';
  document.getElementById('monthTitle').innerHTML = `${currentYear}<span class="year">&nbsp;</span>`;
  const today = new Date(); const todayStr = fmtDate(today);
  let html = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px">';
  for (let mo = 0; mo < 12; mo++) {
    const isCurrentMo = mo === today.getMonth() && currentYear === today.getFullYear();
    html += `<div style="background:var(--surface);border-radius:12px;padding:10px;cursor:pointer;${isCurrentMo?'border:2px solid var(--accent)':'border:1px solid var(--border)'}" onclick="currentMonth=${mo};showMonth()">`;
    html += `<div style="font-size:.7rem;font-weight:700;margin-bottom:6px;${isCurrentMo?'color:var(--accent)':''}">${MONTHS[mo].substring(0,3)}</div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">';
    const first = new Date(currentYear, mo, 1); const last = new Date(currentYear, mo + 1, 0);
    let sd = first.getDay() - 1; if (sd < 0) sd = 6;
    for (let i = 0; i < sd; i++) html += '<div></div>';
    for (let d = 1; d <= last.getDate(); d++) {
      const ds = `${currentYear}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasEv = events.some(e => e.date === ds);
      const isT = ds === todayStr;
      html += `<div style="font-size:.45rem;text-align:center;line-height:1.6;${isT?'background:var(--accent);color:#fff;border-radius:50%;font-weight:700':''}${hasEv&&!isT?';color:var(--accent);font-weight:700':''}">${d}</div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  document.getElementById('calGrid').innerHTML = html;
}

function goToday() { selectedDate = new Date(); currentMonth = selectedDate.getMonth(); currentYear = selectedDate.getFullYear(); showMonth(); setActiveTab('tabToday'); }

// ── Search ──────────────────────────────────────────────────────────────
function openSearch() { document.getElementById('searchOverlay').classList.add('open'); document.getElementById('searchInput').focus(); setActiveTab('tabSearch'); }
function closeSearch() { document.getElementById('searchOverlay').classList.remove('open'); setActiveTab(currentView === 'month' ? 'tabMonth' : currentView === 'agenda' ? 'tabAgenda' : 'tabYear'); }
function doSearch(q) {
  const el = document.getElementById('searchResults');
  if (!q.trim()) { el.innerHTML = ''; return; }
  const lq = q.toLowerCase();
  const results = events.filter(e => e.title.toLowerCase().includes(lq) || (e.notes && e.notes.toLowerCase().includes(lq)));
  if (results.length === 0) { el.innerHTML = '<div class="empty-day"><p>Sin resultados</p></div>'; return; }
  el.innerHTML = results.sort((a,b) => b.date.localeCompare(a.date)).map(ev => {
    const d = new Date(ev.date + 'T12:00:00');
    return `<div class="search-result" onclick="selectDate('${ev.date}');closeSearch();showMonth()"><h4>${esc(ev.title)}</h4><p>${d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})} — ${ev.start}</p></div>`;
  }).join('');
}

// ── Navigation ──────────────────────────────────────────────────────────
function changeMonth(dir) {
  if (currentView === 'year') { currentYear += dir; showYear(); return; }
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}
function selectDate(dateStr) { selectedDate = new Date(dateStr + 'T12:00:00'); currentMonth = selectedDate.getMonth(); currentYear = selectedDate.getFullYear(); renderCalendar(); }

// ── Modal ───────────────────────────────────────────────────────────────
function openModal(ev) {
  document.getElementById('modalTitle').textContent = ev ? 'Editar evento' : 'Nuevo evento';
  document.getElementById('editId').value = ev ? ev.id : '';
  document.getElementById('evTitle').value = ev ? ev.title : '';
  document.getElementById('evStart').value = ev ? ev.start : '09:00';
  document.getElementById('evEnd').value = ev ? ev.end : '10:00';
  document.getElementById('evNotes').value = ev ? ev.notes : '';
  selectedColor = ev ? ev.color : 'orange';
  document.querySelectorAll('.c-dot').forEach(d => d.classList.toggle('active', d.dataset.color === selectedColor));
  const rems = ev ? ev.reminders : [60, '9am', 1440];
  document.querySelectorAll('.rem-chip').forEach(c => { const val = isNaN(c.dataset.min) ? c.dataset.min : parseInt(c.dataset.min); c.classList.toggle('active', rems.includes(val)); });
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('evTitle').focus(), 300);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function pickColor(el) { document.querySelectorAll('.c-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); selectedColor = el.dataset.color; }
function toggleRem(el) { el.classList.toggle('active'); }

// ── Events CRUD ─────────────────────────────────────────────────────────
function saveEvent(e) {
  e.preventDefault();
  const id = document.getElementById('editId').value || crypto.randomUUID();
  const title = document.getElementById('evTitle').value.trim();
  const start = document.getElementById('evStart').value;
  const end = document.getElementById('evEnd').value;
  const notes = document.getElementById('evNotes').value.trim();
  const reminders = [...document.querySelectorAll('.rem-chip.active')].map(c => isNaN(c.dataset.min) ? c.dataset.min : parseInt(c.dataset.min));
  const date = fmtDate(selectedDate);
  const isEdit = events.some(ev => ev.id === id);
  if (isEdit) { cancelReminders(id); events = events.filter(ev => ev.id !== id); }
  const ev = { id, title, date, start, end, notes, color: selectedColor, reminders };
  events.push(ev); saveEvents(); scheduleReminders(ev);
  closeModal(); renderCalendar();
  toast(isEdit ? 'Evento actualizado' : 'Evento creado', 'success');
}
function editEvent(id) { const ev = events.find(e => e.id === id); if (ev) openModal(ev); }
function deleteEvent(id) { events = events.filter(e => e.id !== id); saveEvents(); cancelReminders(id); renderCalendar(); toast('Evento eliminado'); }
function saveEvents() { localStorage.setItem('agenda_events', JSON.stringify(events)); }

// ── Helpers ─────────────────────────────────────────────────────────────
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function urlBase64ToUint8Array(b) { const p = '='.repeat((4 - b.length % 4) % 4); const b64 = (b + p).replace(/-/g, '+').replace(/_/g, '/'); const r = atob(b64); return Uint8Array.from([...r].map(c => c.charCodeAt(0))); }

function toast(msg, type = '') {
  const el = document.createElement('div'); el.className = 'toast' + (type ? ' ' + type : ''); el.textContent = msg;
  document.body.appendChild(el); setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 2500); setTimeout(() => el.remove(), 3000);
}

// ── Voice input ─────────────────────────────────────────────────────────
let activeRecognition = null;
function startVoice(targetId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return toast('Voz no soportada', 'error');
  if (activeRecognition) { activeRecognition.stop(); return; }
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const recognition = new SR(); recognition.lang = 'es-ES'; recognition.continuous = !isIOS; recognition.interimResults = true; activeRecognition = recognition;
  const btn = document.querySelector(`#${targetId}`).parentElement.querySelector('.mic-btn'); btn.classList.add('recording');
  const target = document.getElementById(targetId); const existing = target.value;
  recognition.onresult = (e) => { let interim='',final=''; for(let i=0;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;} const sep=existing.length>0&&!existing.endsWith(' ')?' ':''; target.value=existing+sep+final+interim; };
  recognition.onend = () => { btn.classList.remove('recording'); activeRecognition = null; if (target.value) target.value = target.value.charAt(0).toUpperCase() + target.value.slice(1); };
  recognition.onerror = (e) => { btn.classList.remove('recording'); activeRecognition = null; if (e.error === 'not-allowed') toast('Permite acceso al micrófono', 'error'); else if (e.error !== 'aborted' && e.error !== 'no-speech') toast('Error: ' + e.error, 'error'); };
  recognition.start();
}

// ── Parse time ──────────────────────────────────────────────────────────
const WORD_TO_NUM = {una:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,nueve:9,diez:10,once:11,doce:12};
function parseTime(text) {
  const t = text.toLowerCase();
  let m = t.match(/a\s+las?\s+(\d{1,2})[:\s]?(\d{2})?/); if (m) return fmtTime(parseInt(m[1]), parseInt(m[2]||0), t);
  for (const [w, n] of Object.entries(WORD_TO_NUM)) { const wm = t.match(new RegExp(`a\\s+las?\\s+${w}(\\s+y\\s+media)?`,'i')); if (wm) return fmtTime(n, wm[1]?30:0, t); }
  for (const [w, n] of Object.entries(WORD_TO_NUM)) { const wm = t.match(new RegExp(`${w}(\\s+y\\s+media)?\\s+de\\s+la\\s+(mañana|tarde|noche)`,'i')); if (wm) { let h=n; if((wm[2]==='tarde'||wm[2]==='noche')&&h<12)h+=12; return `${String(h).padStart(2,'0')}:${wm[1]?'30':'00'}`; } }
  m = t.match(/(\d{1,2})(\s+y\s+media)?\s+de\s+la\s+(mañana|tarde|noche)/); if (m) { let h=parseInt(m[1]); if((m[3]==='tarde'||m[3]==='noche')&&h<12)h+=12; return `${String(h).padStart(2,'0')}:${m[2]?'30':'00'}`; }
  if (/por\s+la\s+mañana/.test(t)) return '09:00'; if (/por\s+la\s+tarde/.test(t)) return '16:00'; if (/por\s+la\s+noche/.test(t)) return '20:00'; if (/a\s+mediodía|al\s+mediodía/.test(t)) return '12:00';
  return '09:00';
}
function fmtTime(h, m, text) {
  if (/de\s+la\s+(tarde|noche)/i.test(text) && h >= 1 && h <= 11) h += 12;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ── Parse date ──────────────────────────────────────────────────────────
const DAY_WORDS = {primero:1,uno:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,nueve:9,diez:10,once:11,doce:12,trece:13,catorce:14,quince:15,'dieciséis':16,dieciseis:16,diecisiete:17,dieciocho:18,diecinueve:19,veinte:20,veintiuno:21,'veintiún':21,'veintidós':22,veintidos:22,'veintitrés':23,veintitres:23,veinticuatro:24,veinticinco:25,'veintiséis':26,veintiseis:26,veintisiete:27,veintiocho:28,veintinueve:29,treinta:30,'treinta y uno':31};
const MONTH_WORDS = {enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};
const DOW_WORDS = {lunes:1,martes:2,'miércoles':3,miercoles:3,jueves:4,viernes:5,'sábado':6,sabado:6,domingo:0};

function parseDate(text) {
  const t = text.toLowerCase().normalize('NFD').replace(/[\u0301]/g,'');
  const now = new Date();
  if (/\bpasado\s+mañana\b/i.test(text)) { const d=new Date(now); d.setDate(d.getDate()+2); return d; }
  if (/\bmañana\b/i.test(text) && !/\bde\s+la\s+mañana\b/i.test(text)) { const d=new Date(now); d.setDate(d.getDate()+1); return d; }
  if (/\bhoy\b/i.test(text)) return now;
  for (const [name,dow] of Object.entries(DOW_WORDS)) { if (new RegExp(`\\b(el|este|proximo|próximo)?\\s*${name}\\b`,'i').test(t)) { const d=new Date(now); let diff=dow-d.getDay(); if(diff<=0)diff+=7; d.setDate(d.getDate()+diff); return d; } }
  for (const [w,num] of Object.entries(DAY_WORDS)) { for (const [mn,mnum] of Object.entries(MONTH_WORDS)) { if (new RegExp(`\\b${w}\\s+de\\s+${mn}\\b`,'i').test(t)) { const yr=(mnum<now.getMonth()||(mnum===now.getMonth()&&num<now.getDate()))?now.getFullYear()+1:now.getFullYear(); return new Date(yr,mnum,num); } } }
  const dm = text.toLowerCase().match(/\b(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\b/i);
  if (dm) { const day=parseInt(dm[1]),mon=MONTH_WORDS[dm[2].toLowerCase()]; const yr=(mon<now.getMonth()||(mon===now.getMonth()&&day<now.getDate()))?now.getFullYear()+1:now.getFullYear(); return new Date(yr,mon,day); }
  return null;
}

function stripDate(text) {
  return text.replace(/\bpasado\s+mañana\b/gi,'').replace(/\bmañana\b(?!\s+de\s+la\s+mañana)/gi,function(m,o,s){if(/de\s+la\s+$/.test(s.substring(0,o)))return m;return '';}).replace(/\bhoy\b/gi,'').replace(/\b(el|este|proximo|próximo)\s+(lunes|martes|miércoles|miercoles|jueves|viernes|sábado|sabado|domingo)\b/gi,'').replace(/\b(lunes|martes|miércoles|miercoles|jueves|viernes|sábado|sabado|domingo)\b/gi,'').replace(/\b(primero|uno|dos|tres|cuatro|cinco|seis|siete|ocho|nueve|diez|once|doce|trece|catorce|quince|dieciséis|dieciseis|diecisiete|dieciocho|diecinueve|veinte|veintiuno|veintiún|veintidós|veintidos|veintitrés|veintitres|veinticuatro|veinticinco|veintiséis|veintiseis|veintisiete|veintiocho|veintinueve|treinta|treinta y uno)\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\b/gi,'').replace(/\b\d{1,2}\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\b/gi,'').replace(/\bde\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)\b/gi,'').replace(/\s+/g,' ').trim();
}

function stripTime(text) {
  return text.replace(/\ba\s+las?\s+(\d{1,2})[:\s]?\d{0,2}\b/gi,'').replace(/\ba\s+las?\s+(una|dos|tres|cuatro|cinco|seis|siete|ocho|nueve|diez|once|doce)(\s+y\s+media)?\b/gi,'').replace(/\b(una|dos|tres|cuatro|cinco|seis|siete|ocho|nueve|diez|once|doce)(\s+y\s+media)?\s+de\s+la\s+(mañana|tarde|noche)\b/gi,'').replace(/\b\d{1,2}(\s+y\s+media)?\s+de\s+la\s+(mañana|tarde|noche)\b/gi,'').replace(/\b(por\s+la\s+(mañana|tarde|noche)|a\s+mediodía|al\s+mediodía)\b/gi,'').replace(/\bde\s+la\s+(mañana|tarde|noche)\b/gi,'').replace(/\s+/g,' ').trim();
}

// ── FAB: voz rápida ─────────────────────────────────────────────────────
let fabRecognition = null;
function startQuickVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return toast('Voz no soportada', 'error');
  const fab = document.getElementById('fabMic'); const transcript = document.getElementById('fabTranscript');
  if (fabRecognition) { fabRecognition.stop(); return; }
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.continuous = !isIOS; // iOS no soporta continuous bien
  recognition.interimResults = true;
  fabRecognition = recognition;
  fab.classList.add('recording'); transcript.classList.add('visible'); transcript.textContent = 'Escuchando...';
  let finalText = '', silenceTimer = null, hasSpoken = false;

  function resetSilenceTimer() {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => { recognition.stop(); }, 2000);
  }

  recognition.onaudiostart = () => { transcript.textContent = 'Habla ahora...'; };

  recognition.onresult = (e) => {
    hasSpoken = true;
    let interim = ''; finalText = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    transcript.textContent = (finalText + interim) || 'Escuchando...';
    resetSilenceTimer();
  };

  recognition.onend = () => {
    clearTimeout(silenceTimer);
    // iOS non-continuous: if user spoke, process. If not, restart once.
    if (isIOS && !hasSpoken && fab.classList.contains('recording')) {
      try { recognition.start(); return; } catch(e) {}
    }
    fab.classList.remove('recording'); transcript.classList.remove('visible'); fabRecognition = null;
    if (!finalText.trim()) return;
    let title = finalText.trim(); let hour = parseTime(title); const parsedDate = parseDate(title); title = stripDate(stripTime(title));
    title = title.replace(/^(anotar|apuntar|crear|añadir|poner)\s+/i, '').replace(/\s+/g,' ').trim();
    title = title.charAt(0).toUpperCase() + title.slice(1); if (!title) return;
    const evDate = parsedDate || selectedDate; const id = crypto.randomUUID(); const date = fmtDate(evDate);
    const ev = { id, title, date, start: hour, end: '', notes: '', color: 'orange', reminders: [60, '9am', 1440] };
    events.push(ev); saveEvents(); scheduleReminders(ev);
    selectedDate = evDate; currentMonth = evDate.getMonth(); currentYear = evDate.getFullYear(); showMonth();
    toast(`"${title}" — ${evDate.toLocaleDateString('es-ES',{day:'numeric',month:'long'})} a las ${hour}`, 'success');
  };

  recognition.onerror = (e) => {
    clearTimeout(silenceTimer); fab.classList.remove('recording'); transcript.classList.remove('visible'); fabRecognition = null;
    if (e.error === 'not-allowed') toast('Permite acceso al micrófono', 'error');
    else if (e.error === 'no-speech') toast('No se detectó voz, inténtalo de nuevo', 'error');
    else if (e.error !== 'aborted') toast('Error de voz: ' + e.error, 'error');
  };

  recognition.start();
  // NO timer inicial — solo empieza el timer cuando el usuario habla
}

// ── Alarm sound + overlay ───────────────────────────────────────────────
let alarmAudioCtx = null;
let alarmOscillator = null;
let alarmInterval = null;

function playAlarmSound() {
  try {
    alarmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let playing = true;

    function beep() {
      if (!playing || !alarmAudioCtx) return;
      const osc = alarmAudioCtx.createOscillator();
      const gain = alarmAudioCtx.createGain();
      osc.connect(gain); gain.connect(alarmAudioCtx.destination);
      osc.frequency.value = 880;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.3, alarmAudioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, alarmAudioCtx.currentTime + 0.5);
      osc.start(); osc.stop(alarmAudioCtx.currentTime + 0.5);
    }

    beep();
    alarmInterval = setInterval(beep, 800);
    alarmOscillator = { stop: () => { playing = false; } };

    // Vibrate pattern repeating
    if (navigator.vibrate) {
      (function vibrateLoop() {
        if (!playing) return;
        navigator.vibrate([500, 200, 500, 200, 500]);
        setTimeout(vibrateLoop, 2000);
      })();
    }
  } catch(e) { console.error('Alarm sound error:', e); }
}

function stopAlarm() {
  document.getElementById('alarmOverlay').classList.remove('active');
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
  if (alarmOscillator) { alarmOscillator.stop(); alarmOscillator = null; }
  if (alarmAudioCtx) { alarmAudioCtx.close().catch(()=>{}); alarmAudioCtx = null; }
  if (navigator.vibrate) navigator.vibrate(0);
}

function showAlarm(title, body) {
  document.getElementById('alarmTitle').textContent = title || 'Recordatorio';
  document.getElementById('alarmBody').textContent = body || '';
  document.getElementById('alarmOverlay').classList.add('active');
  playAlarmSound();
}

// Listen for messages from Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data.type === 'ALARM') showAlarm(e.data.title, e.data.body);
    if (e.data.type === 'STOP_ALARM') stopAlarm();
  });
}

// ── Init ────────────────────────────────────────────────────────────────
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
renderCalHeader(); renderCalendar(); initNotifications();

// Check if opened from alarm (app was closed)
const urlParams = new URLSearchParams(window.location.search);
const alarmParam = urlParams.get('alarm');
if (alarmParam) {
  try {
    const data = JSON.parse(alarmParam);
    // Small delay to let AudioContext work after user gesture
    setTimeout(() => showAlarm(data.title, data.body), 500);
    // Clean URL
    history.replaceState(null, '', '/');
  } catch(e) {}
}
